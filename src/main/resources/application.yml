spring:
  application:
    name: rms

  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # dev thì dùng, prod thì đừng có dại
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  logging:
    level:
      org.springframework.jdbc: DEBUG